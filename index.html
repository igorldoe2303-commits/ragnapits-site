<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RagnaPits</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
    color: white;
    text-align: center;
}

header {
    padding: 80px 20px;
}

h1 {
    font-size: 70px;
    color: #ffcc00;
    text-shadow: 0 0 20px black;
}

p {
    color: #ccc;
    font-size: 18px;
}

.buttons {
    margin-top: 40px;
}

.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 18px;
    transition: 0.2s;
}

.download {
    background: #ff9800;
    color: black;
}

.patch {
    background: #2196f3;
    color: white;
}

.discord {
    background: #5865F2;
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<header>
    <h1>RagnaPits</h1>
    <p>Servidor privado de Ragnarok Online</p>

    <div class="buttons">

        <a class="btn download" href="#">📥 Baixar Cliente</a>

        <a class="btn patch" href="#">🔄 Patch</a>

        <a class="btn discord" href="#">💬 Discord</a>

    </div>

</header>

</body>
</html>
